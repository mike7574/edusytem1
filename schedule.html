<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow - Schedule</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/schedule.css">
</head>
<body>
    <div class="app-container" id="app-container">
        <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><span class="logo-icon">📖</span><h2>EduFlow</h2></div>
            </div>
            <nav class="nav-menu">
                <div class="nav-group">
                    <p class="group-title">OVERVIEW</p>
                    <a href="dashboard.html" class="nav-link"><span>🏠</span> Dashboard</a>
                </div>
                <div class="nav-group">
                    <p class="group-title">ACADEMICS</p>
                    <a href="grades.html" class="nav-link"><span>🎓</span> Marks & Grades</a>
                    <a href="attendance.html" class="nav-link"><span>📝</span> Attendance</a>
                    <a href="schedule.html" class="nav-link active"><span>📅</span> Schedule</a>
                </div>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="top-header">
                <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Open menu">☰</button>
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search schedule...">
                </div>
            </header>

            <section class="content-area">
                <div class="today-banner">
                    <div class="banner-top">
                        <div>
                            <p class="banner-label">TODAY</p>
                            <h1 class="banner-day">Tuesday</h1>
                        </div>
                        <div class="banner-count">
                            <p>Classes today</p>
                            <h2>4</h2>
                        </div>
                    </div>
                    
                    <div class="today-grid">
                        <div class="class-card-mini">
                            <div class="mini-icon">📖</div>
                            <div class="mini-info">
                                <h4>Chemistry</h4>
                                <p>8:00 – 9:00 • LAB-02</p>
                            </div>
                            <span class="mini-arrow">›</span>
                        </div>
                        <div class="class-card-mini">
                            <div class="mini-icon">📖</div>
                            <div class="mini-info">
                                <h4>History</h4>
                                <p>9:10 – 10:10 • B-101</p>
                            </div>
                            <span class="mini-arrow">›</span>
                        </div>
                        </div>
                </div>

                <div class="weekly-view">
                    <div class="day-column">
                        <h3 class="day-title">Monday</h3>
                        <div class="schedule-item purple">
                            <p class="subject">Mathematics</p>
                            <p class="time">🕒 8:00 – 9:00</p>
                            <p class="room">📍 A-101</p>
                        </div>
                        <div class="schedule-item green">
                            <p class="subject">English Literature</p>
                            <p class="time">🕒 9:10 – 10:10</p>
                            <p class="room">📍 B-204</p>
                        </div>
                    </div>
                    </div>
            </section>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
