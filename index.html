<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="glass-panel">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your EduFlow account</p>

            <div class="demo-notice">
                <span class="shield-icon">INFO</span>
                Log in to continue, or create an account if you are new.
            </div>

            <form action="dashboard.html" method="GET">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="icon">@</span>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="icon">*</span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <span class="icon-right">Show</span>
                    </div>
                </div>

                <div class="role-group">
                    <label>Sign in as</label>
                    <div class="role-buttons">
                        <button type="button" class="role-btn active" data-role="student">Student</button>
                        <button type="button" class="role-btn" data-role="teacher">Teacher</button>
                        <button type="button" class="role-btn" data-role="admin">Admin</button>
                    </div>
                </div>

                <input type="hidden" id="role" name="role" value="student">

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <p class="signup-link">Don't have an account? <a href="create-account.html">Create Account</a></p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
